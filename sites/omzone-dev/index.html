<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7A9E7E" />

    <!-- Favicon & Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon-192.png" type="image/png" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <!--
      Default SEO — react-helmet-async sobreescribe esto por página.
      Este bloque es el fallback para bots que no ejecutan JS.
    -->
    <title>Omzone · Yoga &amp; Wellness Kitchen</title>
    <meta
      name="description"
      content="Clases de yoga, membresías y complementos wellness en un solo lugar. Reserva tu clase, elige tu plan y vive tu bienestar con Omzone."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://omzone.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Omzone" />
    <meta property="og:title" content="Omzone · Yoga &amp; Wellness Kitchen" />
    <meta
      property="og:description"
      content="Clases de yoga, membresías y complementos wellness en un solo lugar."
    />
    <meta property="og:url" content="https://omzone.com/" />
    <meta property="og:image" content="https://omzone.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_MX" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Omzone · Yoga &amp; Wellness Kitchen" />
    <meta
      name="twitter:description"
      content="Clases de yoga, membresías y complementos wellness en un solo lugar."
    />
    <meta name="twitter:image" content="https://omzone.com/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
